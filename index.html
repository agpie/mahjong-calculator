<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mahjong Payment Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }

    .result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Mahjong Payment Calculator</h2>

    <label>Winner:</label>
    <select id="winner">
      <option value="A">Player A</option>
      <option value="B">Player B</option>
      <option value="C">Player C</option>
      <option value="D">Player D</option>
    </select>

    <label>Base Hand Value:</label>
    <input type="number" id="handValue" placeholder="e.g. 10">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calculate() {
      const winner = document.getElementById("winner").value;
      const handValue = Number(document.getElementById("handValue").value);

      if (!handValue || handValue <= 0) {
        document.getElementById("result").innerText = "Please enter a valid hand value.";
        return;
      }

      const players = ["A", "B", "C", "D"];
      let output = "";

      players.forEach(player => {
        if (player !== winner) {
          output += `Player ${player} pays ${handValue}\n`;
        }
      });

      document.getElementById("result").innerText = output;
    }
  </script>

</body>
</html>
